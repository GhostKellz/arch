# Heimdall observability portals — reverse-proxied by Reverse-proxy.
#
# Matched by server_name (exact hostname) exactly like every other vhost on this box,
# so it can never collide with cs.example.com or any other name.
#
# Kept private (not public-facing) by a source-IP allow-list: only the example trusted
# LAN (192.0.2.0/24) and Tailscale (100.64.0.0/10) clients are allowed; everything
# else is denied. Replace the documentation LAN CIDR before use.
# DNS: local -> 192.0.2.30 and/or Cloudflare (DNS-only) -> 100.64.0.30 both work.
#
# Backends are plain HTTP on Heimdall over the tailnet (100.64.0.10).
# Deploy: install to /etc/nginx/conf.d/heimdall.conf -> nginx -t -> systemctl reload nginx

# WebSocket helper (Grafana Live)
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

upstream heimdall_grafana    { server 100.64.0.10:3000; keepalive 32; }
upstream heimdall_prometheus { server 100.64.0.10:9090; keepalive 32; }
upstream heimdall_alerts     { server 100.64.0.10:9093; keepalive 32; }

# ---------------------------------------------------------------------------
# Grafana @ grafana.example.com
# ---------------------------------------------------------------------------
server {
  listen 80;
  server_name grafana.example.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name grafana.example.com;

  ssl_certificate     /etc/nginx/certs/example.com/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/example.com/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache   shared:SSL:10m;
  client_max_body_size 50m;

  # Private: trusted LAN + Tailscale only
  allow 192.0.2.0/24;
  allow 100.64.0.0/10;
  deny  all;

  location / {
    proxy_pass http://heimdall_grafana;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;
    proxy_buffering off;
  }
}

