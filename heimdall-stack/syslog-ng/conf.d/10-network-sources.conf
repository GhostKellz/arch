# Network ingestion for standard RFC3164/RFC5424 syslog senders
# (Linux hosts, Proxmox nodes, Arch workstation, edge devices).
# FortiGate has its own source (20-fortigate.conf) on udp/tcp 5514.

source s_net_standard {
    # RFC3164 over UDP/TCP 514
    network(
        transport("udp")
        ip("0.0.0.0")
        port(514)
        so-rcvbuf(8388608)
    );
    network(
        transport("tcp")
        ip("0.0.0.0")
        port(514)
        max-connections(200)
    );
    # RFC5424 (IETF) over TCP 601
    syslog(
        transport("tcp")
        ip("0.0.0.0")
        port(601)
        max-connections(200)
    );
};
