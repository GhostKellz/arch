# syslog-ng -> Loki via http() push API (this build lacks the gRPC loki() driver).
# Also keeps a per-host on-disk archive under /var/log/remote for redundancy.

# --- Per-source tagging: set Loki labels + assemble the message into .loki.msg ---
# Standard RFC3164/5424 senders: app = program name, message = ${MESSAGE}.
rewrite r_tag_standard {
    set("syslog",          value("SOURCE_TYPE"));
    set("${PROGRAM:-none}", value("APP"));
    set("${MESSAGE}",       value(".loki.msg"));
};
# FortiGate: no tag in payload, so reconstruct the full key=value blob and use a
# constant app label (avoids the date= token becoming a high-cardinality label).
rewrite r_tag_fortigate {
    set("fortigate",            value("SOURCE_TYPE"));
    set("firewall",             value("APP"));
    set("${PROGRAM} ${MESSAGE}", value(".loki.msg"));
};

# --- JSON-escape .loki.msg for safe embedding in the Loki push body ---
# Order matters: backslash first, then quote, then strip CR/LF.
# NOTE: subst() type("string") is a no-op on syslog-ng 4.8.1 here, so we use the
# default PCRE matcher. PCRE pattern "\\\\" matches one literal backslash; the
# replacement "\\\\" renders two backslashes, "\\\"" renders a backslash+quote.
rewrite r_loki_escape {
    subst("\\\\", "\\\\", value(".loki.msg"), flags("global"));
    subst("\"",   "\\\"", value(".loki.msg"), flags("global"));
    subst("\r",   "",     value(".loki.msg"), flags("global"));
    subst("\n",   " ",    value(".loki.msg"), flags("global"));
};

# --- Loki push destination ---
# Stream labels kept low-cardinality: host, facility, severity, source_type, app.
# Timestamp = reception time, second precision in ns (sender clocks vary; Loki 3
# accepts unordered writes within a stream).
destination d_loki {
    http(
        url("http://127.0.0.1:3100/loki/api/v1/push")
        method("POST")
        headers("Content-Type: application/json")
        body-prefix('{"streams":[')
        body-suffix(']}')
        delimiter(",")
        body('{"stream":{"host":"${HOST}","facility":"${FACILITY}","severity":"${LEVEL}","source_type":"${SOURCE_TYPE}","app":"${APP}"},"values":[["${R_UNIXTIME}000000000","${.loki.msg}"]]}')
        batch-lines(300)
        batch-timeout(2000)
        persist-name("loki")
        disk-buffer(
            mem-buf-size(50000)
            disk-buf-size(536870912)
            reliable(yes)
            dir("/var/lib/syslog-ng")
        )
    );
};

# --- On-disk archive, one tree per sending host ---
destination d_remote_files {
    file(
        "/var/log/remote/${HOST}/${PROGRAM:-misc}.log"
        create-dirs(yes)
        owner("root") group("adm") perm(0640)
        dir-owner("root") dir-group("adm") dir-perm(0750)
    );
};

# --- Log paths ---
log {
    source(s_net_standard);
    rewrite(r_tag_standard);
    rewrite(r_loki_escape);
    destination(d_loki);
    destination(d_remote_files);
};

log {
    source(s_fortigate);
    rewrite(r_tag_fortigate);
    rewrite(r_loki_escape);
    destination(d_loki);
    destination(d_remote_files);
};
