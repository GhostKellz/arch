# FortiGate firewall ingestion.
# FortiGate emits "key=value" payloads with a PRI header but NO RFC3164
# hostname/tag, which breaks default parsing. We give it a dedicated port
# and flags(no-hostname) so the sender IP becomes ${HOST} and the full
# key=value blob stays intact in ${MESSAGE} (query in Loki with `| logfmt`).
#
# Point FortiGate at:  udp/tcp 192.0.2.10:5514
#   config log syslogd setting
#     set status enable
#     set server "192.0.2.10"
#     set port 5514
#     set mode udp        (or reliable for tcp)
#     set format default

source s_fortigate {
    network(
        transport("udp")
        ip("0.0.0.0")
        port(5514)
        flags(no-hostname)
        so-rcvbuf(8388608)
    );
    network(
        transport("tcp")
        ip("0.0.0.0")
        port(5514)
        flags(no-hostname)
        max-connections(50)
    );
};
