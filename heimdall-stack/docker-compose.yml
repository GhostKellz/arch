# Heimdall observability stack
# Host networking per workstation standard. Ports are HOST ports:
#   Loki 3100 | Prometheus 9090 | Alertmanager 9093 | Grafana 3000
#   node_exporter 9100 | cAdvisor 8085 | CrowdSec LAPI 8081 / metrics 6060
# Postgres (crowdsec profile) binds loopback-only via listen_addresses.
# syslog-ng runs natively on the host (privileged :514), not in this stack.

services:
  loki:
    image: grafana/loki:${LOKI_VERSION:-3.4.2}
    container_name: loki
    restart: unless-stopped
    network_mode: host
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100/ready | grep -q ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-v3.1.0}
    container_name: prometheus
    restart: unless-stopped
    network_mode: host
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=40GB
      - --web.listen-address=:9090
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - ./prometheus/targets:/etc/prometheus/targets:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  alertmanager:
    image: prom/alertmanager:${ALERTMANAGER_VERSION:-v0.28.0}
    container_name: alertmanager
    restart: unless-stopped
    network_mode: host
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --web.listen-address=:9093
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-11.5.2}
    container_name: grafana
    restart: unless-stopped
    network_mode: host
    env_file: .env
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=${GF_SERVER_ROOT_URL:-http://192.0.2.10:3000}
      - GF_INSTALL_PLUGINS=grafana-opensearch-datasource
      - GF_FEATURE_TOGGLES_ENABLE=
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

  node-exporter:
    image: prom/node-exporter:${NODE_EXPORTER_VERSION:-v1.9.0}
    container_name: node-exporter
    restart: unless-stopped
    network_mode: host
    pid: host
    command:
      - --path.rootfs=/host
      - --web.listen-address=:9100
      - --collector.systemd
      - --collector.processes
    volumes:
      - /:/host:ro,rslave

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:${CADVISOR_VERSION:-v0.49.1}
    container_name: cadvisor
    restart: unless-stopped
    network_mode: host
    privileged: true
    # Built-in image healthcheck probes $CADVISOR_HEALTHCHECK_URL (defaults to
    # :8080); we serve on :8085, so point the probe at the right port.
    environment:
      - CADVISOR_HEALTHCHECK_URL=http://localhost:8085/healthz
    command:
      - --port=8085
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

volumes:
  loki-data:
  prometheus-data:
  alertmanager-data:
  grafana-data:
